<mat-card class="form-card">
  <mat-card-header>
    <mat-card-title>{{ isEditing ? 'Edit project' : 'Create project' }}</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="projectForm" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline">
        <mat-label>Title</mat-label>
        <input matInput formControlName="title" required>
        <mat-error>A title is required.</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Description</mat-label>
        <textarea matInput formControlName="description" rows="5"></textarea>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Organization</mat-label>
        <mat-select formControlName="organisationId" required>
          <mat-option *ngFor="let organisation of administeredOrganisations" [value]="organisation.id">
            {{ organisation.orgName }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <div class="coordinates">
        <mat-form-field appearance="outline">
          <mat-label>Latitude</mat-label>
          <input matInput type="number" formControlName="latitude">
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Longitude</mat-label>
          <input matInput type="number" formControlName="longitude">
        </mat-form-field>
      </div>

      <mat-checkbox formControlName="closed">Project is closed</mat-checkbox>

      <div class="actions">
        <button mat-button type="button" (click)="router.navigate(['/organisations'])">Cancel</button>
        <button mat-raised-button color="primary" type="submit"
                [disabled]="projectForm.invalid || isSubmitting">
          {{ isEditing ? 'Save changes' : 'Create project' }}
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
