<mat-card class="detail-card">
  <div class="detail-heading">
    <div>
      <h1 class="title">{{ detailedProject?.title }}</h1>
      <span class="status">{{ detailedProject?.closed ? 'Closed' : 'Open' }}</span>
    </div>
    <div class="admin-actions" *ngIf="canManage">
      <button mat-stroked-button (click)="editProject()">
        <mat-icon>edit</mat-icon> Edit
      </button>
      <button mat-stroked-button color="warn" (click)="deleteProject()">
        <mat-icon>delete</mat-icon> Delete
      </button>
    </div>
  </div>

  <div class="info-row">
    <mat-icon>place</mat-icon>
    <span>{{ locationLabel }}</span>
  </div>

  <div class="section">
    <h3><mat-icon>description</mat-icon> Description</h3>
    <p>{{ detailedProject?.description || 'No description provided.' }}</p>
  </div>
</mat-card>
