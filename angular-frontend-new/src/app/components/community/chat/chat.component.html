<div class="chat-container">
  <!-- Header with search -->
  <div class="chat-header">
    <input
      type="text"
      placeholder="Search conversations..."
      [(ngModel)]="searchTerm"
      class="search-bar"
    />
  </div>

  <div *ngIf="showContactPicker" class="contact-picker">
    <p class="picker-title">Start a chat with</p>
    <button
      *ngFor="let friend of friends"
      type="button"
      class="contact-option"
      (click)="startChat(friend)"
    >
      <app-avatar [src]="friend.profilePicture" [name]="friend.name" size="md" />
      <span>
        <strong>{{ friend.name }}</strong>
        <small>{{ friend.username || friend.email }}</small>
      </span>
    </button>
    <p *ngIf="friends.length === 0" class="empty-picker">No contacts found.</p>
  </div>

  <!-- Scrollable list of 1:1 conversations -->
  <div class="chat-list">
    <app-card
      *ngFor="let convo of filteredConversations"
      [routerLink]="['/community/chat', convo.id]"
      routerLinkActive="active"
      ariaCurrentWhenActive="page"
      class="conversation-card"
    >
      <!-- Left: Avatar and timestamp/unread -->
      <div card-left>
        <div class="contact-info">
          <app-avatar [src]="convo.avatar" [name]="convo.contact" size="lg" />
          <div class="timestamp">
            <span class="value">{{ convo.timestamp | date: 'MMM d' }}</span>
            <span class="label time">{{ convo.timestamp | date: 'HH:mm' }}</span>
            <span *ngIf="convo.unreadCount && convo.unreadCount > 0" class="unread-badge" >{{ convo.unreadCount }}</span>
          </div>
        </div>
      </div>

      <!-- Body: Contact name and last message preview -->
      <div card-body>
        <div class="convo-content">
          <p class="contact-name">{{ convo.contact }}</p>
          <p class="last-message-preview">{{ shortenText(convo.lastMessage) }}</p>
        </div>
      </div>

      <!-- Right: Status indicator -->
      <div card-right>
        <span *ngIf="convo.isActive" class="status-dot online"></span>
        <span *ngIf="!convo.isActive" class="status-dot offline"></span>
      </div>
    </app-card>
  </div>

  <!-- Fixed bottom-right FAB for new chat -->
  <button mat-fab class="corner-button" color="primary" (click)="onNewChat()">
    <mat-icon>add</mat-icon>
  </button>
</div>
