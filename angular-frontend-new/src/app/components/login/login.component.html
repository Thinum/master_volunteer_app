<main>
  <!-- Decorative blurs -->
  <div class="absolute top-[-10%] right-[-10%] w-64 h-64 rounded-full blur-3xl"></div>
  <div class="absolute bottom-[-5%] left-[-5%] w-80 h-80 rounded-full blur-3xl"></div>

  <div class="content-wrapper">
    <div class="login-section">
      <!-- Header -->
      <header>
        <div class="inline-flex p-3 mb-6 shadow-header rounded-full">
          <mat-icon class="text-primary text-3xl">volunteer_activism</mat-icon>
        </div>
        <h1 class="text-4xl font-extrabold text-on-surface tracking-tight mb-3">Volunteer Hub</h1>
        <p class="text-on-surface-variant text-lg">Making a difference, together.</p>
      </header>

      <!-- Login Form -->
      <section>
        <div class="space-y-6">
          <form [formGroup]="loginForm">
            <!-- Username Field -->
            <div class="relative mb-6">
              <label class="input-label" for="username">Username</label>
              <div class="group relative">
                <div class="input-icon-left">
                  <mat-icon class="icon-primary transition-colors">person</mat-icon>
                </div>
                <input
                  class="form-input"
                  id="username"
                  placeholder="username"
                  type="text"
                  formControlName="username"
                  [attr.aria-label]="'Username'">
              </div>
            </div>

            <!-- Password Field -->
            <div class="relative">
              <label class="input-label" for="password">Password</label>
              <div class="group relative">
                <div class="input-icon-left">
                  <mat-icon class="icon-primary transition-colors">lock</mat-icon>
                </div>
                <input
                  class="form-input"
                  id="password"
                  placeholder="••••••••"
                  [type]="hidePw() ? 'password' : 'text'"
                  formControlName="password"
                  [attr.aria-label]="'Password'">
                <button
                  type="button"
                  class="input-icon-right"
                  (click)="clickHidePw($event)"
                  [attr.aria-label]="hidePw() ? 'Show password' : 'Hide password'"
                  [attr.aria-pressed]="!hidePw()">
                  <mat-icon>{{ hidePw() ? 'visibility_off' : 'visibility' }}</mat-icon>
                </button>
              </div>
            </div>

            <!-- Remember me & Forgot password -->
            <div class="flex justify-between items-center px-1 mt-6 mb-10">
              <label class="flex items-center gap-3 cursor-pointer">
                <input
                  type="checkbox"
                  class="form-checkbox"
                  formControlName="rememberMe">
                <span class="text-sm font-medium text-on-surface-variant">Remember me</span>
              </label>
              <a class="text-sm font-bold text-primary hover:text-primary-dim transition-colors" href="#">Forgot Password?</a>
            </div>
          </form>
        </div>

        <!-- Sign In Button -->
        <div class="space-y-4">
          <button
            type="button"
            (click)="clickLogin()"
            [disabled]="loginForm.invalid"
            class="btn-primary">
            Sign In
            <mat-icon class="ml-2 text-sm">arrow_forward</mat-icon>
          </button>

          <!-- Divider -->
          <div class="divide-line">
            <span>or continue with</span>
          </div>

          <!-- Social Login Buttons -->
          <div class="grid-cols-2">
            <button class="btn-secondary">
              <mat-icon class="mr-2">gpp_good</mat-icon>
              <span class="text-sm font-semibold text-on-surface">Google</span>
            </button>
            <button class="btn-secondary">
              <mat-icon class="mr-2">apple</mat-icon>
              <span class="text-sm font-semibold text-on-surface">Apple</span>
            </button>
          </div>
        </div>
      </section>

      <!-- Footer -->
      <footer>
        <p class="text-on-surface-variant text-sm font-medium">
          Don't have an account?
          <button
            type="button"
            (click)="clickRegister()"
            class="font-bold text-primary hover:underline transition-all bg-none border-none cursor-pointer p-0 ml-1">
            Create Account
          </button>
        </p>
      </footer>
    </div>

    <!-- Browse Organisations Section -->
    <div class="browse-section">
      <h2 class="section-title">Browse Organisations</h2>
      
      <!-- Search Container -->
      <div class="search-container">
        <mat-form-field appearance="outline" class="search-bar">
          <mat-label>Search</mat-label>
          <input
            matInput
            type="text"
            [(ngModel)]="searchTerm"
            (input)="applyFilters()">
          <button mat-icon-button matSuffix>
            <mat-icon>search</mat-icon>
          </button>
        </mat-form-field>

        <button
          mat-mini-fab
          color="primary"
          (click)="showFilters = !showFilters"
          class="filter-btn">
          <mat-icon>filter_alt</mat-icon>
        </button>
      </div>

      <!-- Filter Panel -->
      <div *ngIf="showFilters" class="filter-panel">
        <h4>Categories</h4>
        <mat-chip-listbox>
          <mat-chip-option
            *ngFor="let cat of categories"
            [selected]="selectedCategory === cat"
            (selectionChange)="toggleCategory(cat)">
            {{ cat }}
          </mat-chip-option>
        </mat-chip-listbox>

        <h4>Tags</h4>
        <mat-chip-listbox multiple>
          <mat-chip-option
            *ngFor="let tag of tags"
            [selected]="selectedTags.includes(tag)"
            (selectionChange)="toggleTag(tag)">
            {{ tag }}
          </mat-chip-option>
        </mat-chip-listbox>
      </div>

      <!-- Organisations List -->
      <div class="organisations-list">
        <div *ngIf="organisationsFiltered.length > 0; else noOrganisations" class="list-content">
          <div *ngFor="let org of organisationsFiltered" class="org-item">
            <div class="org-card">
              <img *ngIf="org.profilePicture" [src]="org.profilePicture" [alt]="org.orgName" class="org-avatar">
              <mat-icon *ngIf="!org.profilePicture" class="org-avatar-placeholder">groups</mat-icon>
              <div class="org-info">
                <h4 class="org-name">{{ org.orgName }}</h4>
                <p class="org-body">{{ org.body }}</p>
                <div *ngIf="org.tags && org.tags.length > 0" class="org-tags">
                  <span *ngFor="let tag of org.tags" class="tag">{{ tag }}</span>
                </div>
              </div>
            </div>
          </div>
        </div>
        <ng-template #noOrganisations>
          <div class="no-results">
            <mat-icon>search_off</mat-icon>
            <p>No organisations found</p>
          </div>
        </ng-template>
      </div>
    </div>
  </div>
</main>
