<section class="section">
  <div class="section-header">
    <div>
      <h3 class="section-title">{{ sectionTitle }}</h3>
      <p>{{ organisationsList?.length || 0 }} organizations</p>
    </div>
  </div>

  <div class="organisation-grid" *ngIf="organisationsList && organisationsList.length > 0; else emptyState">
    <a
      class="organisation-card"
      *ngFor="let org of organisationsList"
      [routerLink]="['/organisations', org.id]"
      routerLinkActive="active"
      ariaCurrentWhenActive="page">

      <div class="avatar-frame">
        <img *ngIf="org.profilePicture" [src]="org.profilePicture" [alt]="org.orgName + ' profile'" class="avatar">
        <mat-icon *ngIf="!org.profilePicture" class="avatar-placeholder">business</mat-icon>
      </div>

      <div class="card-content">
        <span class="organisation-type" *ngIf="org.category">{{ org.category }}</span>
        <div class="card-heading">
          <h4>{{ org.orgName }}</h4>
        </div>

        <p class="description">{{ org.body || 'No description available.' }}</p>

        <div class="tag-row" *ngIf="getVisibleTags(org).length > 0">
          <span
            class="tag"
            [class.tag--matched]="isUserMatchedTag(tag)"
            *ngFor="let tag of getVisibleTags(org)">
            {{ tag }}
          </span>
        </div>

        <div class="card-footer">
          <span class="meta-item">
            <mat-icon>group</mat-icon>
            {{ getMemberCount(org) }} members
          </span>
          <mat-icon class="arrow">chevron_right</mat-icon>
        </div>
      </div>
    </a>
  </div>
</section>

<ng-template #emptyState>
  <div class="empty-state">
    <mat-icon>search_off</mat-icon>
    <p>No organizations found.</p>
  </div>
</ng-template>
